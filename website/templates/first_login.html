<!-- Textos i18n para notificaciones (first_login.js usa t('auth.xxx') -> data-auth-xxx) -->
<div id="i18n-data" style="display:none"
     data-auth-user_not_found="{{ call .t "auth.user_not_found" "User not found" }}"
     data-auth-incorrect_password="{{ call .t "auth.incorrect_password" "Incorrect password" }}"
     data-auth-too_many_attempts="{{ call .t "auth.too_many_attempts" "Too many attempts" }}"
     data-auth-connection_error="{{ call .t "auth.connection_error" "Connection error" }}"
     data-auth-login_generic_error="{{ call .t "auth.login_generic_error" "Login error" }}"
     data-auth-login_success="{{ call .t "auth.login_success" "Login successful" }}"
     data-auth-passwords_dont_match="{{ call .t "auth.passwords_dont_match" "Passwords do not match" }}"
     data-auth-credentials_updated="{{ call .t "auth.credentials_updated" "Credentials updated" }}"
     data-auth-credentials_updated_redirect="{{ call .t "auth.credentials_updated_redirect" "Credentials updated. Redirecting to dashboard." }}"
     data-auth-session_expired="{{ call .t "auth.session_expired" "Session expired" }}"
     data-auth-username="{{ call .t "auth.username" "Username" }}"
     data-auth-password="{{ call .t "auth.password" "Password" }}"
     data-auth-confirm-password="{{ call .t "auth.confirm_password" "Confirm Password" }}"
     data-errors-validation-error="{{ call .t "errors.validation_error" "Validation error" }}"
     data-errors-password-special-char="{{ call .t "errors.password_special_char" "Password must contain a special character" }}"
     data-errors-password-length="{{ call .t "errors.password_length" "Password too short" }}"
     data-errors-password-uppercase="{{ call .t "errors.password_uppercase" "Password must contain an uppercase letter" }}"
     data-errors-password-lowercase="{{ call .t "errors.password_lowercase" "Password must contain a lowercase letter" }}"
     data-errors-password-number="{{ call .t "errors.password_number" "Password must contain a number" }}"
     data-errors-username-required="{{ call .t "errors.username_required" "Username required" }}"
     data-errors-username-too-short="{{ call .t "errors.username_too_short" "Username too short" }}"
     data-errors-username-too-long="{{ call .t "errors.username_too_long" "Username too long" }}"
     data-errors-field-required="{{ call .t "errors.field_required" "This field is required" }}"
     data-errors-invalid-format="{{ call .t "errors.invalid_format" "Invalid format" }}"
     data-errors-too-short="{{ call .t "errors.too_short" "Too short" }}"
     data-errors-too-long="{{ call .t "errors.too_long" "Too long" }}"
     data-errors-invalid-string="{{ call .t "errors.invalid_string" "Invalid text" }}"
     data-errors-invalid-integer="{{ call .t "errors.invalid_integer" "Not a valid integer" }}"
     data-errors-unknown-error="{{ call .t "errors.unknown_error" "Unknown error" }}"
     data-errors-connection-error="{{ call .t "errors.connection_error" "Connection error" }}"
     data-errors-general-error-message="{{ call .t "errors.general_error_message" "An unexpected error occurred" }}"
     data-common-close="{{ call .t "common.close" "Close" }}"
     data-common-show-password="{{ call .t "common.show_password" "Show password" }}"
     data-common-hide-password="{{ call .t "common.hide_password" "Hide password" }}"
></div>

<div class="login-container">
    <div class="login-header">
        <img src="/static/hostberry.png{{ if .last_update }}?v={{ .last_update }}{{ end }}" alt="{{ call .t "common.app_name" "HostBerry" }}" class="logo-image" />
        <h1>{{ call .t "common.app_name" "HostBerry" }}</h1>
        <p>{{ call .t "auth.first_login_info" "Change your default credentials" }}</p>
    </div>

    <form id="firstLoginForm">
        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-person"></i>
                {{ call .t "auth.new_username" "New Username" }}
            </label>
            <input type="text" class="form-control" name="new_username" required minlength="3" maxlength="50" placeholder="{{ call .t "auth.new_username" "New Username" }}">
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-lock"></i>
                {{ call .t "auth.new_password" "New Password" }}
            </label>
            <div class="password-wrapper">
                <input type="password" class="form-control" name="new_password" id="new_password" required minlength="8" maxlength="100" placeholder="{{ call .t "auth.new_password" "New Password" }}">
                <button class="password-toggle" type="button" id="toggle-new-password" aria-label="{{ call .t "common.show_password" "Show password" }}" title="{{ call .t "common.show_password" "Show password" }}">
                    <span id="eye-emoji-new" style="font-size:18px; line-height:1" aria-hidden="true">👁️</span>
                </button>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-lock-fill"></i>
                {{ call .t "auth.confirm_password" "Confirm Password" }}
            </label>
            <div class="password-wrapper">
                <input type="password" class="form-control" name="confirm_password" id="confirm_password" required minlength="8" maxlength="100" placeholder="{{ call .t "auth.confirm_password" "Confirm Password" }}">
                <button class="password-toggle" type="button" id="toggle-confirm-password" aria-label="{{ call .t "common.show_password" "Show password" }}" title="{{ call .t "common.show_password" "Show password" }}">
                    <span id="eye-emoji-confirm" style="font-size:18px; line-height:1" aria-hidden="true">👁️</span>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-check-circle"></i>
            {{ call .t "auth.save_and_continue" "Save and Continue" }}
        </button>
    </form>
</div>

<script defer src="/static/js/first_login.js{{ if .last_update }}?v={{ .last_update }}{{ end }}"></script>
