<!-- Textos i18n para notificaciones JS (login.js) según idioma seleccionado -->
<div id="i18n-data" style="display:none"
     data-user-not-found="{{ call .t "auth.user_not_found" "User not found" }}"
     data-incorrect-password="{{ call .t "auth.incorrect_password" "Incorrect password" }}"
     data-too-many-attempts="{{ call .t "auth.too_many_attempts" "Too many attempts" }}"
     data-connection-error="{{ call .t "auth.connection_error" "Connection error" }}"
     data-login-generic-error="{{ call .t "auth.login_generic_error" "Login error" }}"
     data-login-success="{{ call .t "auth.login_success" "Login successful" }}"
></div>

<div class="login-container">
    <div class="login-header">
        <img src="/static/hostberry.png{{ if .last_update }}?v={{ .last_update }}{{ end }}" alt="{{ call .t "common.app_name" "HostBerry" }}" class="logo-image" />
        <h1>HostBerry</h1>
        <p>{{ call .t "auth.login_info" "Inicia sesión para continuar" }}</p>
    </div>

    {{ if .ShowDefaultCredentialsNotice }}
    <div id="first-login-credential-notice" class="alert alert-warning alert-default-credentials mb-3" role="alert" style="display: block; visibility: visible; min-height: 2.5rem;">
        <i class="bi bi-exclamation-triangle me-2"></i>
        {{ call .t "auth.default_credentials_notice" "Se han detectado credenciales por defecto activas. Cámbialas inmediatamente tras iniciar sesión." }}
    </div>
    {{ end }}

    <form id="loginForm" method="POST" action="/api/v1/auth/login">
        <div class="mb-3">
            <label for="username" class="form-label">
                <i class="bi bi-person"></i>
                {{ call .t "auth.username" "" }}
            </label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="{{ call .t "auth.username_placeholder" "Usuario" }}">
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">
                <i class="bi bi-lock"></i>
                {{ call .t "auth.password" "" }}
            </label>
            <div class="password-wrapper">
                <input type="password" class="form-control" id="password" name="password" required placeholder="{{ call .t "auth.password_placeholder" "Contraseña" }}">
                <button class="password-toggle" type="button" id="toggle-password" aria-label="{{ call .t "common.show_password" "Mostrar contraseña" }}" title="{{ call .t "common.show_password" "Mostrar contraseña" }}">
                    <span id="eye-emoji" style="font-size:18px; line-height:1" aria-hidden="true">👁️</span>
                </button>
            </div>
        </div>
        
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">
                {{ call .t "auth.remember_me" "" }}
            </label>
        </div>
        
        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right"></i>
            {{ call .t "auth.login" "" }}
        </button>
    </form>
</div>

<script defer src="/static/js/login.js{{ if .last_update }}?v={{ .last_update }}{{ end }}"></script>
