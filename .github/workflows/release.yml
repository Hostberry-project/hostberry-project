name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ''
            asset: hostberry-linux-amd64
          - goos: linux
            goarch: arm64
            goarm: ''
            asset: hostberry-linux-arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            asset: hostberry-linux-armv7
          - goos: linux
            goarch: arm
            goarm: '6'
            asset: hostberry-linux-armv6
          - goos: linux
            goarch: '386'
            goarm: ''
            asset: hostberry-linux-386
          - goos: linux
            goarch: riscv64
            goarm: ''
            asset: hostberry-linux-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ${{ matrix.asset }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -trimpath -ldflags="-s -w" -o "${{ matrix.asset }}" .
          sha256sum "${{ matrix.asset }}" | awk '{print $1}' > "${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generar SHA256SUMS combinado (verificacion manual)
        working-directory: dist
        run: |
          : > SHA256SUMS
          for f in hostberry-linux-*; do
            case "$f" in *.sha256) continue ;; esac
            printf '%s  %s\n' "$(sha256sum "$f" | awk '{print $1}')" "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
